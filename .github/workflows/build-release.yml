name: Build release exe

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the exe to
        required: true
        default: v6.7
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2 requests wxPython==4.2.1

      - name: Build executable
        run: |
          pyinstaller --clean --onefile --windowed --name Basit_Radyo Basit_Radyo.py

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: dist/Basit_Radyo.exe
          fail_on_unmatched_files: true
          overwrite_files: true
